name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Copy database
        run: cp shetland.db site/shetland.db

      - name: Copy images
        run: |
          mkdir -p site/public/images/people
          if [ -d "site/public/images/people" ]; then
            echo "Images directory exists with $(ls site/public/images/people | wc -l) files"
          fi

      - name: Build
        working-directory: site
        run: npm run build

      - name: Fix base path in links
        run: |
          BASE="/shetland-political-history"
          find site/dist -name '*.html' -exec sed -i \
            -e "s|href=\"/|href=\"${BASE}/|g" \
            -e "s|action=\"/|action=\"${BASE}/|g" \
            -e "s|src=\"/images|src=\"${BASE}/images|g" \
            {} +

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
